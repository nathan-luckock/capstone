name: Release

# Cut a release by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
#
# The Docker image publishes to GHCR with no extra setup (the built-in
# GITHUB_TOKEN has package write access). To also publish the Python SDK to
# PyPI, set the repository variable PUBLISH_PYPI=true and add the secret
# PYPI_API_TOKEN.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Publish server image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/picklejar
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  pypi:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_PYPI == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build sdk/python
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
